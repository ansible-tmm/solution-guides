    <!-- Copy-to-clipboard buttons for code blocks -->
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        document.querySelectorAll('pre').forEach(function(pre) {
          var wrapper = document.createElement('div');
          wrapper.style.position = 'relative';
          pre.parentNode.insertBefore(wrapper, pre);
          wrapper.appendChild(pre);

          var btn = document.createElement('button');
          btn.className = 'copy-btn';
          btn.textContent = 'Copy';
          btn.setAttribute('aria-label', 'Copy code to clipboard');
          wrapper.appendChild(btn);

          btn.addEventListener('click', function() {
            var code = pre.querySelector('code');
            var text = code ? code.textContent : pre.textContent;
            navigator.clipboard.writeText(text).then(function() {
              btn.textContent = 'Copied!';
              btn.classList.add('copy-btn--success');
              setTimeout(function() {
                btn.textContent = 'Copy';
                btn.classList.remove('copy-btn--success');
              }, 2000);
            });
          });
        });
      });
    </script>

    <!-- Konami Code Easter Egg -->
    <img id="konami-easter-egg" style="
      position: fixed;
      width: 300px;
      height: auto;
      z-index: 99999;
      pointer-events: none;
      display: none;
    "/>
    <script>
      (function() {
        var konamiCode = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
        var konamiIndex = 0;
        var easterEggImages = [
          '{{ "/assets/images/nuno-way-out.png" | relative_url }}',
          '{{ "/assets/images/roger-that.png" | relative_url }}',
          '{{ "/assets/images/leo-sticker.png" | relative_url }}'
        ];

        document.addEventListener('keydown', function(e) {
          if (e.key === konamiCode[konamiIndex]) {
            konamiIndex++;
            if (konamiIndex === konamiCode.length) {
              konamiIndex = 0;
              launchEasterEgg();
            }
          } else {
            konamiIndex = 0;
          }
        });

        function launchEasterEgg() {
          var img = document.getElementById('konami-easter-egg');
          img.src = easterEggImages[Math.floor(Math.random() * easterEggImages.length)];
          var viewH = window.innerHeight;
          var startY = Math.random() * (viewH - 350);

          img.style.display = 'block';
          img.style.left = '-320px';
          img.style.top = startY + 'px';
          img.style.transform = 'rotate(0deg)';
          img.style.transition = 'none';

          var bounceCount = 0;
          var maxBounces = 3;
          var posX = -320;
          var posY = startY;
          var velX = 4.8 + Math.random() * 1.6;
          var velY = -(4.8 + Math.random() * 2.4);
          var gravity = 0.32;
          var rotation = 0;
          var spin = 4.8 + Math.random() * 4.8;
          var screenW = window.innerWidth;

          function animate() {
            posX += velX;
            velY += gravity;
            posY += velY;
            rotation += spin;

            // Bounce off the bottom
            if (posY > viewH - 300) {
              posY = viewH - 300;
              velY = -(Math.abs(velY) * 0.7);
              bounceCount++;
              spin *= 0.8;
            }

            img.style.left = posX + 'px';
            img.style.top = posY + 'px';
            img.style.transform = 'rotate(' + rotation + 'deg)';

            if (posX < screenW + 400) {
              requestAnimationFrame(animate);
            } else {
              img.style.display = 'none';
            }
          }

          requestAnimationFrame(animate);
        }
      })();
    </script>
